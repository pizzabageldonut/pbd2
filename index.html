<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizza Bagel Donut</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --pizzabg: #faf9f6; --text: #1a1a1a; --sauce: #b22222; --border: #d3d6da; --key: #e3e3e1; --pizzabox: #e1b272; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--pizzabg); color: var(--text); display: flex; flex-direction: column; height: 100vh; height: 100svh; margin: 0; padding: 0; overflow: hidden; }
        header { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); background: var(--pizzabg); flex-shrink: 0; }
        .logo-emoji-hero { font-size: 2.2rem; letter-spacing: 12px; margin-bottom: 4px; padding-left: 12px; display: block; }
        h4 { font-size: 0.9rem; letter-spacing: 4px; color: var(--sauce); text-transform: uppercase; margin: 0; font-weight: 900; text-align: center; width: 100%; }
        
        #game { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto; overflow: hidden; }
        #guess-log { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 10px 15px; align-items: center; }
        
        .guess-row { display: grid; grid-template-columns: 1fr 1.2fr; align-items: center; padding: 10px 15px; background: #fff; border: 1px solid var(--border); border-radius: 4px; width: 100%; max-width: 240px; box-sizing: border-box; }
        .guess-code { font-family: 'Courier New', monospace; font-size: 1.3rem; font-weight: 800; letter-spacing: 4px; }
        .guess-emojis { display: flex; justify-content: flex-end; font-size: 1.1rem; }
        .guess-row.winner { background-color: var(--pizzabox); border-color: #c99b5a; color: #fff; }

        .controls-area { background: var(--pizzabg); border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .input-display-area { display: flex; justify-content: center; gap: 10px; padding: 10px 0; background: #fff; border-bottom: 1px solid var(--border); }
        .digit-box { width: 38px; height: 42px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; color: var(--sauce); background: #fff; }
        .digit-box.filled { border-color: var(--sauce); }

        .keypad-area { padding: 5px; display: flex; flex-direction: column; gap: 5px; }
        .key-row { display: flex; gap: 5px; width: 100%; }
        .key { flex: 1; height: 46px; background: var(--key); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; cursor: pointer; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        .key:active { background: #bbb; }
        .key.action { background: #c5c5c3; font-size: 0.7rem; letter-spacing: 0.5px; flex: 2; }

        .toolbar { display: flex; justify-content: space-around; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); }
        .tool-btn { font-size: 1.5rem; cursor: pointer; opacity: 0.8; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .modal-content { max-width: 400px; margin: 0 auto; }
        .rule-line { display: flex; align-items: center; gap: 15px; margin: 18px 0; font-size: 0.95rem; line-height: 1.4; text-align: left; }
    </style>
</head>
<body>

<header>
    <div class="logo-wrapper">
        <span class="logo-emoji-hero">🍕🥯🍩</span>
        <h4>PIZZA BAGEL DONUT</h4>
    </div>
</header>

<div id="game">
    <div id="guess-log"></div>
    <div class="controls-area">
        <div id="end-msg" style="display:none; text-align:center; padding:12px; font-weight:800; color:var(--sauce); background:#fff; border-bottom: 1px solid var(--border);"></div>
        <div class="input-display-area" id="input-boxes">
            <div class="digit-box" id="d0"></div><div class="digit-box" id="d1"></div><div class="digit-box" id="d2"></div>
        </div>
        <div class="keypad-area" id="keyboard">
            <div class="key-row">
                <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div><div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div>
            </div>
            <div class="key-row">
                <div class="key" onclick="press('6')">6</div><div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div><div class="key" onclick="press('0')">0</div>
            </div>
            <div class="key-row">
                <div class="key action" onclick="press('DEL')">DELETE</div>
                <div class="key action" style="background:var(--sauce); color:white;" onclick="press('ENT')">SUBMIT ORDER</div>
            </div>
        </div>
        <div class="toolbar">
            <div class="tool-btn" onclick="toggleModal('info-modal', true)">❓</div>
            <div id="share-icon" class="tool-btn" style="opacity:0.2; pointer-events:none;" onclick="share()">📤</div>
            <div class="tool-btn" onclick="toggleModal('stats-modal', true)">📊</div>
        </div>
    </div>
</div>

<div class="modal" id="info-modal">
    <div class="modal-content" style="text-align:left;">
        <h2 style="color:var(--sauce); text-transform:uppercase; letter-spacing:1px; font-size:1.1rem; text-align:center;">How to Unlock Your Pizza Box!</h2>
        <p style="font-size:0.85rem; margin-bottom:20px; color:#555; text-align:center;">Guess the 3-digit daily code in <strong>6 tries</strong>.</p>
        
        <div style
